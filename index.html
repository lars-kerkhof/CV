<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lars Kerkhof — CV</title>
<meta name="description" content="CV of Lars Kerkhof — MSc Data Science in Business and Entrepreneurship.">
<style>
  :root { --bg:#e8e6e1; --ink:#2b2f36; --accent:#3a3f47; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         display:flex; flex-direction:column; align-items:center; padding:32px 16px; min-height:100vh; }
  .bar { width:100%; max-width:840px; display:flex; justify-content:space-between;
         align-items:center; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
  h1 { font-size:1.15rem; letter-spacing:.04em; margin:0; font-weight:600; }
  a.btn { background:var(--accent); color:#fff; text-decoration:none; font-size:.9rem;
          padding:10px 18px; border-radius:8px; transition:opacity .15s; white-space:nowrap; }
  a.btn:hover { opacity:.85; }
  .cv { width:100%; max-width:840px; border-radius:6px; display:block;
        box-shadow:0 8px 30px rgba(0,0,0,.18); }
</style>
</head>
<body>
  <div class="bar">
    <h1>Lars Kerkhof — CV</h1>
    <a class="btn" href="./CV_Lars_Kerkhof.pdf" download>Download PDF</a>
  </div>
  <img class="cv" src="./CV_Lars_Kerkhof.png" alt="CV of Lars Kerkhof">
</body>
</html>
